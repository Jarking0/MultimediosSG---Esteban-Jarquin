<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Laboratorio Carteles - WebComponents</title>
  <link rel="stylesheet" href="./index.css">
  <script type="module" src="./index.js" defer></script>
</head>
<body>
  <main>
    <poster-card
      title="¡LA SEDE TE ACOMPAÑA!"
      subtitle="El respeto no se negocia"
      img="/assets/Poster1.jpeg"
      cta-text="Leer más"
      cta-href="https://example.org/respeto"
      theme="#ffd54f">
      <span slot="badge">UCR</span>
      <p>¡Pará ya de acosar! Línea de apoyo 1234</p>
    </poster-card>

    <poster-card
      title="Laboratorio 1 y 2"
      subtitle="Horario y acceso"
      img="/assets/Poster2.jpeg"
      cta-text="Ver horarios"
      cta-href="https://example.org/labs"
      theme="#4fc3f7">
      <span slot="badge">Labor</span>
      <p>Entrada por la puerta norte. Horario: 8:00 - 17:00</p>
    </poster-card>
  </main>
</body>
</html>
